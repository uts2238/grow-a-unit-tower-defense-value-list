<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grow A Unit Tower Defense Value List</title>

<link rel="icon" href="https://tr.rbxcdn.com/180DAY-4b813f79cb348446d1bc2b2d8ac50993/768/432/Image/Webp/noFilter">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:linear-gradient(135deg,#7b2ff7,#2979ff,#00e5ff);
  --card:#171c38;
  --text:#edf2ff;
  --muted:#9ea7d6;
  --accent:#8a2be2;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  background-size:400% 400%;
  animation:bgMove 15s ease infinite;
  color:var(--text);
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 30px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px);
  border-radius:0 0 22px 22px;
}

nav b{
  font-size:18px;
}

nav div{
  display:flex;
  gap:12px;
}

nav button{
  border:none;
  background:none;
  color:var(--muted);
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

nav button:hover{
  color:white;
  transform:translateY(-2px);
}

section{
  display:none;
  max-width:1400px;
  margin:auto;
  padding:40px;
}

section.active{
  display:block;
}

.hero{
  text-align:center;
}

.hero img{
  width:220px;
  border-radius:24px;
  box-shadow:0 0 40px rgba(255,255,255,.25);
}

.hero h1{
  margin-top:22px;
  font-size:38px;
  background:linear-gradient(90deg,#fff,#c4f1ff,#d5b3ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.value-card{
  background:rgba(0,0,0,.35);
  border-radius:24px;
  padding:16px;
  transition:.2s;
}

.value-card:hover{
  transform:translateY(-4px);
}

.value-card img{
  width:100%;
  border-radius:16px;
}

.value-card b{
  display:block;
  margin-top:12px;
  font-size:16px;
}

.value-line{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

.variant-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  margin-top:12px;
}

.vbtn{
  border:none;
  background:rgba(255,255,255,.08);
  color:white;
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  font-size:11px;
  font-weight:700;
}

.vbtn.active{
  background:var(--accent);
}

.trade{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}

.trade-side{
  flex:1;
  min-width:300px;
  background:rgba(0,0,0,.4);
  border-radius:24px;
  padding:20px;
}

.Unit{
  display:flex;
  gap:12px;
  align-items:center;
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  position:relative;
  cursor:pointer;
}

.Unit img{
  width:60px;
  border-radius:14px;
}

.overlay{
  position:absolute;
  top:5px;
  right:5px;
  background:rgba(0,0,0,.6);
  padding:4px 7px;
  border-radius:8px;
  font-size:12px;
}

.value{
  margin-left:auto;
  font-weight:700;
}

.total{
  text-align:right;
  margin-top:12px;
  font-weight:700;
}

.add{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

.result{
  text-align:center;
  margin-top:30px;
  font-size:28px;
  font-weight:700;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  width:340px;
  background:#151a30;
  border-radius:24px;
  padding:24px;
}

.modal-box h3{
  margin-top:0;
}

.modal-box label{
  display:block;
  margin-top:14px;
  margin-bottom:6px;
  color:var(--muted);
  font-size:13px;
}

.modal-box input,
.modal-box select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1d2342;
  color:white;
  outline:none;
}

@media(max-width:768px){

nav{
  flex-direction:column;
  gap:14px;
}

nav div{
  flex-wrap:wrap;
  justify-content:center;
}

section{
  padding:20px;
}

.hero img{
  width:160px;
}

.hero h1{
  font-size:28px;
}

.grid{
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
}

}

</style>
</head>

<body>

<nav>

<b>Grow A Unit Tower Defense Value List</b>

<div>
<button onclick="show('home')">Home</button>
<button onclick="show('values')">Value List</button>
<button onclick="show('trade')">Trade Calculator</button>
<button onclick="show('credits')">Credits</button>
</div>

</nav>

<section id="home" class="active">

<div class="hero">

<img src="https://tr.rbxcdn.com/180DAY-4b813f79cb348446d1bc2b2d8ac50993/768/432/Image/Webp/noFilter">

<h1>Grow A Unit Tower Defense Value List</h1>

<p>Track values, avoid L trades, become rich 💎</p>

<p>1 value = 1k gems 💎</p>

</div>

</section>

<section id="values">

<h2>Unit Values</h2>

<div class="grid" id="unitGrid"></div>

</section>

<section id="trade">

<div class="trade">

<div class="trade-side" id="you">

<h3>Your Offer</h3>

<div class="list"></div>

<button class="add" onclick="openModal('you')">
+ Add Unit
</button>

<div class="total">
Total:
<span id="yt">0</span>
</div>

</div>

<div class="trade-side" id="them">

<h3>Their Offer</h3>

<div class="list"></div>

<button class="add" onclick="openModal('them')">
+ Add Unit
</button>

<div class="total">
Total:
<span id="tt">0</span>
</div>

</div>

</div>

<div class="result" id="res">
Fair 🤝
</div>

</section>

<section id="credits">

<h2>Credits</h2>

<div class="grid">

<div class="value-card">
<img src="https://cdn.discordapp.com/embed/avatars/0.png">
<b>random</b>
<div class="value-line">
Made the site
</div>
</div>

</div>

</section>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Add Unit</h3>

<label>Unit</label>
<select id="UnitSelect"></select>

<label>Amount</label>
<input type="number" id="amt" value="1" min="1">

<label>Variant</label>
<select id="variant">

<option value="normal">
Normal
</option>

<option value="gold">
Gold
</option>

<option value="rainbow">
Rainbow
</option>

<option value="signed">
Signed
</option>

<option value="goldsigned">
Gold + Signed
</option>

<option value="rainbowsigned">
Rainbow + Signed
</option>

</select>

<button class="add" onclick="addUnit()">
Add Unit
</button>

</div>

</div>

<script>


const Units = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:110,
  demand:6
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:130,
  demand:5
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:70,
  demand:7
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:10,
  demand:0
}

];


const UnitsGOLD = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:0,
  demand:0
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:0,
  demand:0
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:0,
  demand:0
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:0,
  demand:0
}

];


const UnitsRAINBOW = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:0,
  demand:0
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:0,
  demand:0
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:0,
  demand:0
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:0,
  demand:0
}

];


const UnitsSIGNED = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:0,
  demand:0
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:0,
  demand:0
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:0,
  demand:0
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:0,
  demand:0
}

];


const UnitsGOLDSIGNED = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:0,
  demand:0
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:0,
  demand:0
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:0,
  demand:0
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:0,
  demand:0
}

];


const UnitsRAINBOWSIGNED = [

{
  name:"Zeus Blossom",
  img:"ZB.png",
  base:0,
  demand:0
},

{
  name:"Lemon & Lime",
  img:"LNL.png",
  base:0,
  demand:0
},

{
  name:"Candy Blossom",
  img:"CB.png",
  base:0,
  demand:0
},

{
  name:"Moon Blossom Mech",
  img:"MBM.png",
  base:0,
  demand:0
}

];

const unitGrid =
document.getElementById("unitGrid");

const UnitSelect =
document.getElementById("UnitSelect");

const modal =
document.getElementById("modal");

const yt =
document.getElementById("yt");

const tt =
document.getElementById("tt");

const res =
document.getElementById("res");

const amt =
document.getElementById("amt");

const variant =
document.getElementById("variant");

let currentSide = "you";

/* =========================
   NAVIGATION
========================= */

function show(id){

document.querySelectorAll("section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

show("home");

/* =========================
   REBUILD
========================= */

function rebuild(){

unitGrid.innerHTML = "";

Units.forEach((u,i)=>{

const card =
document.createElement("div");

card.className = "value-card";

card.innerHTML = `

<img src="${u.img}">

<b>${u.name}</b>

<div class="variant-row">

<button class="vbtn active" data-type="normal">
Normal
</button>

<button class="vbtn" data-type="gold">
Gold
</button>

<button class="vbtn" data-type="rainbow">
Rainbow
</button>

<button class="vbtn" data-type="signed">
Signed
</button>

<button class="vbtn" data-type="goldsigned">
Gold + Signed
</button>

<button class="vbtn" data-type="rainbowsigned">
Rainbow + Signed
</button>

</div>

<div class="value-line">

Value:
<span class="shownVal">
${u.base.toFixed(2)}
</span>

|

Demand:
<span class="shownDemand">
${u.demand}
</span>/10

</div>

`;

const shownVal =
card.querySelector(".shownVal");

const shownDemand =
card.querySelector(".shownDemand");

const buttons =
card.querySelectorAll(".vbtn");

buttons.forEach(btn=>{

btn.onclick = ()=>{

buttons.forEach(
b=>b.classList.remove("active")
);

btn.classList.add("active");

let list = Units;

switch(btn.dataset.type){

case "gold":
list = UnitsGOLD;
break;

case "rainbow":
list = UnitsRAINBOW;
break;

case "signed":
list = UnitsSIGNED;
break;

case "goldsigned":
list = UnitsGOLDSIGNED;
break;

case "rainbowsigned":
list = UnitsRAINBOWSIGNED;
break;

}

const found =
list.find(x=>x.name===u.name);

if(found){

shownVal.textContent =
found.base.toFixed(2);

shownDemand.textContent =
found.demand;

}

};

});

unitGrid.appendChild(card);

});

populateSelect();

}

rebuild();

/* =========================
   SELECT
========================= */

function populateSelect(){

UnitSelect.innerHTML = "";

Units.forEach((u,i)=>{

const o =
document.createElement("option");

o.value = i;

o.textContent = u.name;

UnitSelect.appendChild(o);

});

}

/* =========================
   MODAL
========================= */

function openModal(side){

currentSide = side;

modal.classList.add("show");

}

modal.addEventListener("click",(e)=>{

if(e.target===modal){

modal.classList.remove("show");

}

});

/* =========================
   TOTALS
========================= */

function updateTotals(){

const sum = (side)=>

[...document.querySelectorAll(
`#${side} .value`
)]

.reduce((a,b)=>

a + (+b.textContent || 0)

,0);

const y = sum("you");

const t = sum("them");

yt.textContent = y.toFixed(2);

tt.textContent = t.toFixed(2);

const d = y - t;

res.textContent =

d >= 0.6
? "Lose 💀"

: d <= -0.6
? "Win 🤑"

: "Fair 🤝";

}

/* =========================
   ADD UNIT
========================= */

function addUnit(){

const index =
+UnitSelect.value;

const amount =
+amt.value || 1;

const base =
Units[index];

if(!base) return;

let list = Units;

let badge = "";

switch(variant.value){

case "gold":
list = UnitsGOLD;
badge = "🟨";
break;

case "rainbow":
list = UnitsRAINBOW;
badge = "🌈";
break;

case "signed":
list = UnitsSIGNED;
badge = "✍️";
break;

case "goldsigned":
list = UnitsGOLDSIGNED;
badge = "🟨 ✍️";
break;

case "rainbowsigned":
list = UnitsRAINBOWSIGNED;
badge = "🌈 ✍️";
break;

}

const final =
list[index] || base;

const value =
(final.base * amount).toFixed(2);

const el =
document.createElement("div");

el.className = "Unit";

el.innerHTML = `

<img src="${base.img}">

${badge
? `<div class="overlay">${badge}</div>`
: ""
}

<div>

<b>
${base.name} x${amount}
</b>

<div style="color:var(--muted);font-size:13px;">
Demand ${final.demand}/10
</div>

</div>

<span class="value">
${value}
</span>

`;

el.onclick = ()=>{

el.remove();

updateTotals();

};

document.querySelector(
`#${currentSide} .list`
)

.appendChild(el);

modal.classList.remove("show");

updateTotals();

}

</script>

</body>
</html>
