<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grow A Unit Tower Defense Value List</title>

<link rel="icon" href="https://tr.rbxcdn.com/180DAY-4b813f79cb348446d1bc2b2d8ac50993/768/432/Image/Webp/noFilter">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:linear-gradient(135deg,#7b2ff7,#2979ff,#00e5ff);
  --card:#171c38;
  --text:#edf2ff;
  --muted:#9ea7d6;
  --accent:#8a2be2;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  background-size:400% 400%;
  animation:bgMove 15s ease infinite;
  color:var(--text);
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  border-radius:0 0 22px 22px;
}

nav b{
  font-size:18px;
}

nav div{
  display:flex;
  gap:12px;
}

nav button{
  border:none;
  background:none;
  color:var(--muted);
  font-weight:700;
  cursor:pointer;
}

nav button:hover{
  color:white;
}

section{
  display:none;
  padding:40px;
  max-width:1500px;
  margin:auto;
}

section.active{
  display:block;
}

.hero{
  text-align:center;
}

.hero img{
  width:230px;
  border-radius:24px;
  box-shadow:0 0 40px rgba(255,255,255,.25);
}

.hero h1{
  font-size:38px;
  margin-top:20px;
}

.hero p{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:rgba(0,0,0,.35);
  border-radius:22px;
  padding:16px;
}

.card img{
  width:100%;
  border-radius:16px;
}

.card b{
  display:block;
  margin-top:12px;
  font-size:17px;
}

.info{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.variants{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:12px;
}

.variants button{
  border:none;
  border-radius:10px;
  padding:6px 10px;
  background:rgba(255,255,255,.08);
  color:white;
  cursor:pointer;
  font-size:11px;
  font-weight:700;
}

.variants button.active{
  background:var(--accent);
}

.trade{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}

.trade-box{
  flex:1;
  min-width:300px;
  background:rgba(0,0,0,.4);
  border-radius:22px;
  padding:20px;
}

.unit{
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,.05);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  position:relative;
}

.unit img{
  width:60px;
  border-radius:12px;
}

.badge{
  position:absolute;
  top:5px;
  right:5px;
  background:rgba(0,0,0,.6);
  padding:4px 7px;
  border-radius:8px;
  font-size:12px;
}

.value{
  margin-left:auto;
  font-weight:700;
}

.total{
  text-align:right;
  margin-top:12px;
  font-weight:700;
}

.add{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.result{
  text-align:center;
  margin-top:30px;
  font-size:28px;
  font-weight:700;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  width:340px;
  background:#161b36;
  border-radius:22px;
  padding:24px;
}

.modal-box input,
.modal-box select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#23294d;
  color:white;
  margin-top:6px;
  margin-bottom:14px;
}

@media(max-width:768px){

nav{
  flex-direction:column;
  gap:12px;
}

nav div{
  flex-wrap:wrap;
  justify-content:center;
}

section{
  padding:20px;
}

.hero img{
  width:160px;
}

.hero h1{
  font-size:28px;
}

.grid{
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
}

}

</style>
</head>

<body>

<nav>

<b>Grow A Unit Tower Defense Value List</b>

<div>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('values')">Values</button>
<button onclick="showPage('trade')">Trade Calc</button>
</div>

</nav>

<section id="home" class="active">

<div class="hero">

<img src="https://tr.rbxcdn.com/180DAY-4b813f79cb348446d1bc2b2d8ac50993/768/432/Image/Webp/noFilter">

<section id="values">

<div class="grid" id="grid"></div>

</section>

<section id="trade">

<div class="trade">

<div class="trade-box" id="you">

<h3>Your Offer</h3>

<div class="list"></div>

<button class="add" onclick="openModal('you')">
+ Add Unit
</button>

<div class="total">
Total:
<span id="yt">0</span>
</div>

</div>

<div class="trade-box" id="them">

<h3>Their Offer</h3>

<div class="list"></div>

<button class="add" onclick="openModal('them')">
+ Add Unit
</button>

<div class="total">
Total:
<span id="tt">0</span>
</div>

</div>

</div>

<div class="result" id="result">
Fair 🤝
</div>

</section>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Add Unit</h3>

<label>Unit</label>
<select id="unitSelect"></select>

<label>Amount</label>
<input type="number" id="amount" min="1" value="1">

<label>Variant</label>

<select id="variant">

<option value="normal">Normal</option>
<option value="gold">Gold</option>
<option value="rainbow">Rainbow</option>
<option value="signed">Signed</option>
<option value="goldsigned">Gold + Signed</option>
<option value="rainbowsigned">Rainbow + Signed</option>

<button class="add" onclick="addUnit()">
Add Unit
</button>

</div>

</div>

const Variants = {
normal:"",
gold:"🟨",
rainbow:"🌈",
signed:"✍️",
goldsigned:"🟨 ✍️",
rainbowsigned:"🌈 ✍️"
};

const grid = document.getElementById("grid");
const unitSelect = document.getElementById("unitSelect");

Units.forEach((u,i)=>{

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${u.img}">

<b>${u.name}</b>

<div class="info">

Rarity: ${u.rarity}<br>
Value: ${u.value}<br>
Demand: ${u.demand}/10<br>
Status: ${u.status}

</div>

<div class="variants">

<button class="active">
Normal
</button>

<button>
Gold
</button>

<button>
Rainbow
</button>

<button>
Signed
</button>

<button>
Gold + Signed
</button>

<button>
Rainbow + Signed
</button>

</div>

`;

grid.appendChild(card);

const option =
document.createElement("option");

option.value = i;
option.textContent = u.name;

unitSelect.appendChild(option);

});

function showPage(id){

document.querySelectorAll("section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

let currentSide = "you";

function openModal(side){

currentSide = side;

document.getElementById("modal")
.classList.add("show");

}

document.getElementById("modal")
.onclick = e=>{

if(e.target.id==="modal"){

document.getElementById("modal")
.classList.remove("show");

}

};

function addUnit(){

const unit =
Units[unitSelect.value];

const amount =
+document.getElementById("amount").value;

const variant =
document.getElementById("variant").value;

const badge =
Variants[variant];

const value =
typeof unit.value === "number"
? (unit.value * amount).toFixed(2)
: "???";

const el =
document.createElement("div");

el.className = "unit";

el.innerHTML = `

<img src="${unit.img}">

${badge
? `<div class="badge">${badge}</div>`
: ""
}

<div>

<b>
${unit.name} x${amount}
</b>

<div style="font-size:13px;color:var(--muted);">
${value}
</div>

</div>

<span class="value">
${typeof value === "number" ? value : 0}
</span>

`;

el.onclick = ()=>{

el.remove();

updateTotals();

};

document.querySelector(
`#${currentSide} .list`
)

.appendChild(el);

document.getElementById("modal")
.classList.remove("show");

updateTotals();

}

function updateTotals(){

const calc = side =>

[...document.querySelectorAll(
`#${side} .value`
)]

.reduce((a,b)=>

a + (+b.textContent || 0)

,0);

const y = calc("you");
const t = calc("them");

document.getElementById("yt")
.textContent = y.toFixed(2);

document.getElementById("tt")
.textContent = t.toFixed(2);

const d = y - t;

document.getElementById("result")
.textContent =

d >= 0.6
? "Lose 💀"

: d <= -0.6
? "Win 🤑"

: "Fair 🤝";

}
